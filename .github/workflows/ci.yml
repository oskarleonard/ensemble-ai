name: CI

on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per ref — a new push supersedes the one still running.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # Report every version's result, not just the first failure.
      fail-fast: false
      matrix:
        # 20 is the `engines.node` floor; 24 is the `.nvmrc` dev pin.
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # typecheck + lint + test + build — the same gate `npm run check` runs locally.
      - run: npm run check
